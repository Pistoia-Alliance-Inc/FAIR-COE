site_name: FAIR-Community of Experts Documentation Hub

theme:
  name: material
  logo: images/new-pisto-logo.png
  icon:
    repo: fontawesome/brands/github
  features:
#    - navigation.sections
    - navigation.top 
    - search.suggest
    - search.highlight
    - navigation.footer
  palette:

    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default 
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

plugins:
  - search
  - redirects:
      redirect_maps: {}
  - minify:
      minify_html: true
  - graph:
      name: "title"
  - macros:
      on_error_fail: true
  - tags:
      tags_slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - plantuml_markdown:
      format: svg
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

extra_css:
  - stylesheets/dama-context.css

extra:
  consent:
    title: Cookie consent
    description: >-
      We use cookies to recognize your repeated visits and preferences, as well
      as to measure the effectiveness of our documentation and whether users
      find what they're searching for. With your consent, you're helping us to
      make our documentation better.
  generator: false

validation:
  nav:
    omitted_files: info
    not_found: warn
    absolute_links: info
  links:
    not_found: warn
    anchors: ignore
    absolute_links: info
    unrecognized_links: info

repo_url: https://github.com/Pistoia-Alliance-Inc/FAIR-COE
repo_name: Pistoia-Alliance-Inc/FAIR-COE
copyright: Copyright &copy; Pistoia Alliance Inc
